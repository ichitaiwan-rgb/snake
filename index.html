<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>16x16 經典貪吃蛇（身尾轉向修正版）</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; 
        }

        h1 {
            color: #333;
            margin: 5px 0;
            font-size: 24px;
        }

        #score-board {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        #game-board {
            width: 100%;
            height: 100%;
            background-color: #1a202c;
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(16, 1fr);
            gap: 1px;
            border: 4px solid #2d3748;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }

        .cell {
            background-color: #000000;
        }

        /* 統一全圖片基礎樣式 */
        .snake-head, .snake, .snake-tail {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
        }

        .snake-head { background-image: url('c.png'); }
        .snake      { background-image: url('b.png'); }
        .snake-tail { background-image: url('tttt.png'); }

        /* 你的完美旋轉設定 */
        .dir-left {
            transform: rotate(0deg);
        }

        .dir-up {
           transform: rotate(90deg);
        }

        .dir-right {
            transform: scaleX(-1);
        }

        .dir-down {
            transform: rotate(-90deg);
        }

        .food {
            background-color: #f56565;
            border-radius: 50%;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 24px;
            box-sizing: border-box;
            z-index: 10;
        }

        button {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #3182ce;
        }
        
        button:active {
            transform: scale(0.95);
        }

        .tip {
            margin-top: 15px;
            color: #718096;
            font-size: 14px;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>經典貪吃蛇 (16 × 16)</h1>
    <div id="score-board">分數: <span id="score">0</span></div>

    <div class="game-container">
        <div id="game-board"></div>
        <div id="game-over-screen">
            <div>遊戲結束!</div>
            <button id="restart-btn">重新開始</button>
        </div>
    </div>

    <div class="tip">電腦：方向鍵或 WASD<br>手機：直接在黑框地圖上「上下左右滑動」控制</div>

    <script>
        const BOARD_SIZE = 16;
        let gameBoard, scoreElement, gameOverScreen;
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameInterval = null;
        const gameSpeed = 150;

        let touchStartX = 0;
        let touchStartY = 0;

        function createBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                gameBoard.appendChild(cell);
            }
        }

        function resetGame() {
            createBoard();
            snake = [
                { x: 4, y: 8 },
                { x: 3, y: 8 },
                { x: 2, y: 8 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            
            generateFood();
            draw();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function generateFood() {
            while (true) {
                food.x = Math.floor(Math.random() * BOARD_SIZE);
                food.y = Math.floor(Math.random() * BOARD_SIZE);
                const onSnake = snake.some(segment => segment.x === food.x && segment.y === food.y);
                if (!onSnake) break;
            }
        }

        function draw() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => { cell.className = 'cell'; });

            snake.forEach((segment, index) => {
                const cellIndex = segment.y * BOARD_SIZE + segment.x;
                if (!cells[cellIndex]) return;

                let segmentDir = 'right';

                if (index === 0) {
                    // 1. 蛇頭
                    cells[cellIndex].classList.add('snake-head');
                    segmentDir = direction.toLowerCase();
                } else {
                    // 2. 身體與尾巴方向推算
                    const prevSegment = snake[index - 1];
                    
                    if (prevSegment.x < segment.x) segmentDir = 'left';
                    else if (prevSegment.x > segment.x) segmentDir = 'right';
                    else if (prevSegment.y < segment.y) segmentDir = 'up';
                    else if (prevSegment.y > segment.y) segmentDir = 'down';

                    if (index === snake.length - 1) {
                        cells[cellIndex].classList.add('snake-tail');
                        // 💡 關鍵修正：尾巴的方向要跟前進方向相反（也就是跟原計算反轉 180 度）
                        if (segmentDir === 'left') segmentDir = 'right';
                        else if (segmentDir === 'right') segmentDir = 'left';
                        else if (segmentDir === 'up') segmentDir = 'down';
                        else if (segmentDir === 'down') segmentDir = 'up';
                    } else {
                        cells[cellIndex].classList.add('snake');
                    }
                }

                // 套用旋轉
                cells[cellIndex].classList.add(`dir-${segmentDir}`);
            });

            const foodIndex = food.y * BOARD_SIZE + food.x;
            if (cells[foodIndex]) {
                cells[foodIndex].classList.add('food');
            }
        }

        function gameLoop() {
            direction = nextDirection;
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'UP': head.y -= 1; break;
                case 'DOWN': head.y += 1; break;
                case 'LEFT': head.x -= 1; break;
                case 'RIGHT': head.x += 1; break;
            }

            if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) {
                endGame();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function changeDirection(newDir) {
            if (newDir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
            if (newDir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
            if (newDir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (newDir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
        }

        document.addEventListener('DOMContentLoaded', () => {
            gameBoard = document.getElementById('game-board');
            scoreElement = document.getElementById('score');
            gameOverScreen = document.getElementById('game-over-screen');

            document.getElementById('restart-btn').addEventListener('click', resetGame);

            window.addEventListener('keydown', e => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W': changeDirection('UP'); break;
                    case 'ArrowDown': case 's': case 'S': changeDirection('DOWN'); break;
                    case 'ArrowLeft': case 'a': case 'A': changeDirection('LEFT'); break;
                    case 'ArrowRight': case 'd': case 'D': changeDirection('RIGHT'); break;
                }
            });

            window.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: false });

            window.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

            window.addEventListener('touchend', e => {
                if (!touchStartX || !touchStartY) return;
                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;
                let diffX = touchEndX - touchStartX;
                let diffY = touchEndY - touchStartY;
                const threshold = 30;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > threshold) {
                        if (diffX > 0) changeDirection('RIGHT');
                        else changeDirection('LEFT');
                    }
                } else {
                    if (Math.abs(diffY) > threshold) {
                        if (diffY > 0) changeDirection('DOWN');
                        else changeDirection('UP');
                    }
                }
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: false });

            resetGame();
        });

        function endGame() {
            clearInterval(gameInterval);
            gameOverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
